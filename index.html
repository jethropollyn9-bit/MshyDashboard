<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC 26 | Mshy Minions hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-bar">
        <div class="logo">FC<span class="volt">26</span></div>
        <div class="mode">CLUB HUB: MSHY MINIONS</div>
    </nav>

    <main>
        <header class="hero">
            <h1>SQUAD <span class="volt">MANAGEMENT</span></h1>
            <button id="add-player-btn">+ SIGN PLAYER</button>
        </header>

        <div class="stats-bar">
            <div class="stat-box">
                <span class="label">OVR</span>
                <span class="value volt" id="team-avg">81</span>
            </div>
            <div class="stat-box">
                <span class="label">SQUAD SIZE</span>
                <span class="value" id="player-count">3</span>
            </div>
        </div>

        <section id="roster-grid">
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
